databases:
  - name: hospital-management-db
    plan: free
    databaseName: hospital_management
    user: hospital_user

services:
  - type: web
    name: hospital-management-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend && python manage.py collectstatic --noinput
    preDeployCommand: cd backend && python manage.py migrate --noinput
    startCommand: cd backend && gunicorn hospital_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-management-db
          property: connectionString
    autoDeploy: true
