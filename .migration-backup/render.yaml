services:
  - type: web
    name: hospital-management-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: gunicorn hospital_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.vercel\.app$,^https://.*\.onrender\.com$
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.vercel.app,https://*.onrender.com
    autoDeploy: true
