version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: hospital_db
    environment:
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_password
      POSTGRES_DB: hospital_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hospital-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital_backend
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py collectstatic --noinput &&
             gunicorn hospital_system.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      DEBUG: "False"
      SECRET_KEY: "docker-dev-key-change-in-production"
      DATABASE_URL: "postgresql://hospital_user:hospital_password@db:5432/hospital_db"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:5000"
      CORS_ALLOWED_ORIGIN_REGEXES: "^https://.*\\.vercel\\.app$,^https://.*\\.onrender\\.com$"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:5000"
      STATIC_URL: "/static/"
      MEDIA_URL: "/media/"
    volumes:
      - ./backend:/app/backend
      - ./backend/media:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hospital-network

  # Frontend Development Server (optional, use npm run dev locally)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital_frontend
    environment:
      VITE_API_URL: "http://backend:8000/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - hospital-network

volumes:
  postgres_data:

networks:
  hospital-network:
    driver: bridge
